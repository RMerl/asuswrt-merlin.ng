<div id="workarea" class="row">
    <style>
        :root, [data-asuswrt-color="light"] {

            --color-stroke-start: var(--gradient-accent-end); /* radar-stroke */
            --color-stroke-end: var(--gradient-accent-start); /* radar-stroke */
            --slider-fill-start: var(--gradient-accent-end); /* filled area */
            --slider-fill-end: var(--gradient-accent-start);
            --slider-track: var(--border-default); /* unfilled area */
            --slider-thumb: var(--brand-primary); /* drag handle */
            --progress: 50%;

            /* Bandwidth row specific semantic tokens */
            --bandwidth-divider-gap: 16px;
            --toggle-radius: 14px;
            --toggle-thumb-radius: 50%;
            --tab-navigation-active-text: var(--text-primary);
            --tab-navigation-active-primary: var(--primary-60, #C00);
            --radius-none: 0;
            --tab-navigation-bg-color: var(--body-bg-color, #ededed);
            --tab-navigation-hover-bg: var(--black-alpha-3);
            --tab-navigation-text-color: rgba(var(--text-primary-rgb),0.8);
            --setting-row-bg: var(--surface-card);
            --divide-stroke-color-default: var(--white-alpha-60);
            --divider-strong: var(--white-alpha-100);
            --divider-weak: var(--black-alpha-3);
            --divider-default: var(--neutral-30);
        }

        [data-asuswrt-color="dark"] {
            --color-stroke-start: var(--gradient-accent-end); /* radar-stroke */
            --color-stroke-end: var(--gradient-accent-start); /* radar-stroke */
            --slider-fill-start: var(--gradient-accent-end); /* filled area */
            --slider-fill-end: var(--gradient-accent-start);
            --slider-track: rgba(var(--surface-invert-rgb),0.4); /* unfilled area */
            --slider-thumb: var(--brand-primary); /* drag handle */
            --progress: 50%;

            --tab-navigation-bg-color: var(--body-bg-color);
            --tab-navigation-active-text: var(--white-alpha-100);
            --tab-navigation-active-primary: var(--primary-50);
            --tab-navigation-hover-bg: var(--white-alpha-5);
            --tab-navigation-text-color: var(--white-alpha-100);
            --setting-row-bg: rgba(var(--surface-card-rgb),0.8);
            --divide-stroke-color-default: var(--divider-default);
            --divider-strong: var(--white-alpha-10);
            --divider-weak: var(--white-alpha-5);
            --divider-default: var(--border-default);
        }
        [data-asuswrt-theme="asus"], [data-asuswrt-theme="business"]{
            --bg-image-qoe: none;
            --qoe-setting-div-svg: var(--black-alpha-3);
            --qoe-chart-div-svg: none;
            --qoe-function-div-svg: none;
            --function-btn-img: none;
            --color-start:  #155fff; /* radar-fill */
            --color-end: #6deeff; /* radar-fill */
        }
        [data-asuswrt-theme="rog"]{
            --color-start:  #155fff; /* radar-fill */
            --color-end: #fb62f6; /* radar-fill */

        }

        .circle-animation {
            position: absolute;
            top: 50%;
            left: 50%;

            height: 400px;
            border: 5px solid rgba(0, 255, 255, 0.3);

            align-items: center;

            flex-direction: column;
            width: max-content;
        }



        .pentagon-container .icon1 {
            top: 0%;
            left: 50%;
        }

            top: 17px;
            left: 50%;

        /* slider styles */
        input[type="range"] {
            z-index: 10;
            cursor: pointer;
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(
                    to right,
                    var(--slider-fill-start),
                    var(--slider-fill-end) 50%,
                    var(--slider-track) 50%
            );
            outline: none;
            transition: background 0.3s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--slider-thumb);
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        /* drag handle styles */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--slider-thumb);
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--slider-thumb);
            cursor: pointer;
            border: none;
        }

        .qoe-grid {

        @media (min-width: 1400px) {

            .qoe-setting-div-svg { max-width: var(--qoe-left-max, 560px); }

        @media (min-width: 1200px) and (max-width: 1399.98px) {

            .qoe-setting-div-svg { max-width: var(--qoe-left-max-md, 520px); }
            .qoe-function-div-svg { max-width: var(--qoe-right-max-md, 320px); }
            /* 版面同 1199：左卡片在上，中+右並排在下，優先縮右卡 */
            .qoe-col-1 { flex: 0 0 100%; max-width: 100%; margin-bottom: var(--wrt-gutter-md); }
            .qoe-cr-group {
                display: flex;
                flex-wrap: wrap;
                align-items: stretch;
                gap: var(--wrt-gutter-md);
            }
            .qoe-cr-group > .col-12 { flex: 0 0 auto; width: auto; } /* 覆蓋 col-12: width:100% */
            .qoe-cr-group > .col-12:first-child { flex: 0 0 var(--qoe-center-width); max-width: var(--qoe-center-width); }
            .qoe-cr-group > .col-12:last-child { flex: 1 1 var(--qoe-right-min); min-width: var(--qoe-right-min); }

        /* 1199 以下：左卡片縮短高度且撐滿欄寬（由寬推高） */

        /* 992-1199：左在上、下方中+右並排；中維持寬度、右可縮到 200px */
        /* 992-1199：優先維持中間，左右再縮 */
        @media (min-width: 992px) and (max-width: 1199.98px) {
            .qoe-chart-div-svg { max-width: var(--qoe-chart-max-sm, 560px); }
            /*.qoe-setting-div-svg { max-width: var(--qoe-left-max-sm, 440px); }*/

            .qoe-cr-group {
                display: flex;

            }
            .qoe-cr-group > .col-12 {
                flex: 0 0 auto;
                width: auto; /* 覆蓋 col-12 的 width:100% */
            }
            /* 中欄固定以中心卡片寬度為主 */
            .qoe-cr-group > .col-12:first-child {
                flex: 0 0 var(--qoe-center-width);
                max-width: var(--qoe-center-width);
            }
            /* 右欄最小 200px，可伸縮 */

        /* 768-991：左在上、下方中+右並排；中維持寬度、右可縮到 200px */

                flex: 0 0 auto;
                width: auto; /* 覆蓋 col-12 的 width:100% */
            }
            .qoe-cr-group > .col-12:first-child {
                flex: 0 0 var(--qoe-center-width);
                max-width: var(--qoe-center-width);
            }
            .qoe-cr-group > .col-12:last-child {
                flex: 1 1 200px;
                min-width: 200px;
            }
        }
        /* 單點 768px：沿用 769 版面，為避免換行，中心卡寬減 1px */
        @media (width: 768px) {

            }

                flex: 1 1 calc(200px - 1px);
                min-width: calc(200px - 1px);
            }

                    headerHeight = document.querySelector('header').scrollHeight;

<script type="module">
    import {AsuswrtWidgetLoading, ClientSelector} from "/js/component.module.js";
    import {ClientList} from '/js/clientlist.module.js';

    function onTabShown(tab) {
        // Logic to execute when switching tabs, e.g., DataTables adjustments
        if (tab === 'bandwidth') {
            if (bwLimiterRuleTable && bwLimiterRuleTable.dataTable) {
                setTimeout(() => {
                    bwLimiterRuleTable.dataTable.columns.adjust();
                }, 50);
            }
        }
    }

    if (isSupport("ark_limiter")) {
        document.getElementById("bandwidth-tab-btn").style.display = "";
        document.getElementById("bandwidth-tab-divider").style.display = "";
    }

    document.querySelectorAll("button.tab-navigation__item").forEach(button => {
        button.addEventListener("click", () => {
            document.querySelectorAll("button.tab-navigation__item").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");
            const tab = button.getAttribute("data-tab");
            document.querySelectorAll(".tab-content").forEach(container => container.style.display = "none");
            const tabSection = document.getElementById(`tab-section-${tab}`);
            tabSection.style.display = "block";

            onTabShown(tab);
        });
    });

    const widgetloader = new AsuswrtWidgetLoading();
    document.querySelector('#workarea').appendChild(widgetloader.render());

    const getNvramData = async () => {
        const data = await httpApi.nvramGet(["ark_qoe_enable", "ark_qoe_profile"], true);
        const nvramCharToAsciiData = await httpApi.nvramCharToAscii(["ark_qoe_psettings"]);
        const orig_ark_qoe_psettings = decodeURIComponent(nvramCharToAsciiData.ark_qoe_psettings);
        const support_ark_qoe_enable = ['0', '1'];
        const support_ark_qoe_profile = ["ai", "gaming", "streaming", "wfh", "office"];
        const enableValue = data.ark_qoe_enable.toString();
        const validatedEnable = support_ark_qoe_enable.includes(enableValue) ? enableValue : support_ark_qoe_enable[0];
        const validatedProfile = support_ark_qoe_profile.includes(data.ark_qoe_profile) ? data.ark_qoe_profile : support_ark_qoe_profile[0];
        const validatePsettingsRange = (psettings) => {
            const parts = psettings.split("<");
            if (parts.length !== 5) return false;
            return parts.every(part => {
                const num = parseInt(part);
                return num >= -10 && num <= 10 && !isNaN(num);
            });
        };

        const validatedPsettings = validatePsettingsRange(orig_ark_qoe_psettings)
            ? orig_ark_qoe_psettings
            : "0<0<0<0<0";
        return {
            orig_ark_qoe_enable: validatedEnable,
            orig_ark_qoe_profile: validatedProfile,
            orig_ark_qoe_psettings_array: validatedPsettings.split("<"),
        }
    }

    class qoeModeButton {
        constructor(props) {
            const {
                text = '',
                active = false,
            } = props;
            this.element = document.createElement('div');
            const template = document.createElement('template');
            this.element.className = 'mode-button';
            if (active) {
                this.element.classList.add('active');
            }
            template.innerHTML = `<div class="function-btn-img"></div><div class="function-btn-img-bar"></div>${text}`;
            this.element.appendChild(template.content.cloneNode(true));
            return this.element;
        }
    }

    getNvramData().then(nvramData => {
        const orig_ark_qoe_enable = nvramData.orig_ark_qoe_enable || "0";
        const orig_ark_qoe_profile = nvramData.orig_ark_qoe_profile || "ai";
        const orig_ark_qoe_psettings_array = nvramData.orig_ark_qoe_psettings_array || ["0", "0", "0", "0", "0"];

        if (orig_ark_qoe_enable === "1") {
            document.getElementById("enable_qoe_btn").classList.add("active");
            document.getElementById("applyBtn").classList.remove("disabled");
        } else {
            document.getElementById("enable_qoe_btn").classList.remove("active");
            document.getElementById("applyBtn").classList.add("disabled");
        }

        const modes = [
            {
                title: "<#AiQoE_mode_balance#>",
                text: `<i class="ic-qoe-aibalance"></i><div class="mode-button-text"><#AiQoE_mode_balance#></div>`,
                mode: "ai",
                value: orig_ark_qoe_psettings_array[0],
                desc: `<#AiQoE_mode_balance_desc#>`,
                radarSet: [70, 80, 50, 60, 50],
                splitLine: true,
                nodeFormula: x => [Math.max(0, 4 - (x / 10)), Math.max(0, 4 + (x / 10)), Math.max(1, 2 - (x / 10)), 3, Math.max(0, 3 + (x / 10))],
            },
            {
                title: "<#AiQoE_mode_gaming#>",
                text: `<i class="ic-qoe-gaming"></i><div class="mode-button-text"><#AiQoE_mode_gaming#></div>`,
                mode: "gaming",
                value: orig_ark_qoe_psettings_array[1],
                desc: `<#AiQoE_mode_gaming_desc#>`,
                radarSet: [50, 95, 30, 40, 85],
                splitLine: true,
                nodeFormula: x => [Math.max(0, 2 - (x / 10)), Math.max(0, 5 + (x / 10)), Math.max(1, 1 - (x / 10)), 2, Math.max(0, 3 + (x / 10))],
            },
            {
                title: "<#AiQoE_mode_streaming#>",
                text: `<i class="ic-qoe-streaming"></i><div class="mode-button-text"><#AiQoE_mode_streaming#></div>`,
                mode: "streaming",
                value: orig_ark_qoe_psettings_array[2],
                desc: `<#AiQoE_mode_streaming_desc#>`,
                radarSet: [90, 50, 40, 80, 60],
                splitLine: true,
                nodeFormula: x => [Math.max(0, 3 - (x / 10)), 3, 1, Math.max(0, 5 + (x / 10)), 2],
            },
            {
                title: "<#AiQoE_mode_wfh#>",
                text: `<i class="ic-qoe-wfh"></i><div class="mode-button-text"><#AiQoE_mode_wfh#></div>`,
                mode: "wfh",
                value: orig_ark_qoe_psettings_array[3],
                desc: `<#AiQoE_mode_wfh_desc#>`,
                radarSet: [60, 40, 80, 50, 70],
                splitLine: true,
                nodeFormula: x => [Math.max(0, 3 - (x / 10)), Math.max(0, 3 + (x / 10)), Math.max(1, 3 - (x / 10)), 3, Math.max(0, 4 + (x / 10))],
            },
            {
                title: "<#AiQoE_mode_office#>",
                text: `<i class="ic-qoe-office"></i><div class="mode-button-text"><#AiQoE_mode_office#></div>`,
                mode: "office",
                value: orig_ark_qoe_psettings_array[4],
                desc: `<#AiQoE_mode_office_desc#>`,
                radarSet: [50, 30, 90, 45, 60],
                splitLine: false,
                nodeFormula: x => [Math.max(0, 3 - (x / 10)), 1, Math.max(0, 4 - (x / 10)), 3, Math.max(0, 5 + (x / 10))],
            },
        ]
        const thisMode = modes.find(m => m.mode === orig_ark_qoe_profile);
        thisMode.active = true;

        const title = document.getElementById("modeTitle");
        const description = document.getElementById("modeDescription");
        const slider = document.getElementById("tuningSlider");
        const sliderValue = document.getElementById("tuningValue");
        title.textContent = thisMode.title;
        description.textContent = thisMode.desc;
        slider.value = thisMode.value;
        sliderValue.innerText = thisMode.value;
        updateSliderBackground(slider);

        modes.forEach(m => {
            const btn = new qoeModeButton({
                text: m.text,
                active: m.active,
            });
            btn.setAttribute("data-mode", m.mode);
            btn.addEventListener("click", () => {
                const buttons = document.querySelectorAll(".mode-button");
                buttons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                modes.forEach(m => m.active = false);
                m.active = true;

                const title = document.getElementById("modeTitle");
                const description = document.getElementById("modeDescription");
                const slider = document.getElementById("tuningSlider");
                const sliderValue = document.getElementById("tuningValue");
                title.textContent = m.title;
                description.textContent = m.desc;

                radarChart.data.datasets[0].data = m.nodeFormula(0).map(dara => {
                    return dara * 0.6; // adjust point size
                });
                radarChart.data.datasets[1].data = m.nodeFormula(0).map(dara => {
                    return dara * 0.8; // adjust point size
                });
                radarChart.data.datasets[2].data = m.nodeFormula(0);
                radarChart.update();

                slider.value = m.value;
                slider.dispatchEvent(new Event('input'));
                sliderValue.innerText = m.value;

                replayAnimation(svgLayer1Id);
            });
            m.btn = btn;
            document.querySelector('.button-container').append(btn);
            if (m.splitLine) {
                const splitLine = document.createElement('div');
                //splitLine.className = 'split-line';
                //document.querySelector('.button-container').append(splitLine);
            }
        })

        const svgLayer1Id = 'radarAnimate';

        function replayAnimation(svgId) {
            const svg = document.getElementById(svgId);
            if (!svg) return;

            const parent = svg.parentNode;
            const clone = svg.cloneNode(true);

            // remove original SVG and reinsert to force trigger CSS animation
            parent.removeChild(svg);
            parent.appendChild(clone);
        }

        window.addEventListener('DOMContentLoaded', () => {
            replayAnimation(svgLayer1Id);
        });

        const labels = ['Bandwidth Utilization', 'Game', 'File Transfer', 'Multimedia', 'Real-Time'];

        // create radar line gradient styles
        // Chart.register({

        Chart.register({

            afterDatasetsDraw(chart) {
                const {ctx, scales} = chart;
                const r = scales.r;
                const numberOfPoints = 5;

                // The dashboard can tear down or resize this chart while navigating away.
                // Guard against partial chart state so the plugin does not throw during redraw.
                if (
                    !ctx ||
                    !r ||
                    typeof r.xCenter !== "number" ||
                    typeof r.yCenter !== "number" ||
                    typeof r.drawingArea !== "number" ||
                    !isFinite(r.xCenter) ||
                    !isFinite(r.yCenter) ||
                    !isFinite(r.drawingArea) ||
                    r.drawingArea <= 0
                ) {
                    return;
                }

                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; // dashed line color
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]); // dashed line style [line length, gap length]

                for (let i = 0; i < numberOfPoints; i++) {
                    // calculate angle: first point at top (-90 degrees), then clockwise distribution
                    const angle = (Math.PI * 2 / numberOfPoints) * i - Math.PI / 2;
                    const x = r.xCenter + Math.cos(angle) * r.drawingArea;
                    const y = r.yCenter + Math.sin(angle) * r.drawingArea;

                    ctx.beginPath();
                    ctx.moveTo(r.xCenter, r.yCenter);
                    ctx.lineTo(x, y);
                    ctx.stroke();

                            </div>`

                            return `<div class="client-name">${targetValue}</div>`
                        }


                    },
                    className: 'dt-head-left'
                },
                {
                    title: `<#BwLimiter_Download#>`, data: 'download_bw', className: 'dt-head-center dt-body-center',
                    render: function (data, type, row) {
                        return (data === "" || typeof data === 'undefined') ? "-" : `${Number(data) / 1024} Mbps`;
                    }
                },
                {
                    title: `<#BwLimiter_Upload#>`, data: 'upload_bw', className: 'dt-head-center dt-body-center',
                    render: function (data, type, row) {
                        return (data === "" || typeof data === 'undefined') ? "-" : `${Number(data) / 1024} Mbps`;
                    }
                },
                {
                    title: `<#BwLimiter_Delete#>`, data: '', className: 'dt-head-center dt-body-center', sortable: false,
                    render: function (data, type, row) {
                        return `<button type="button" class="btn p-0 rule-delete"><i class="icon-static ic-delete"></i></button>`;
                    }
                }
            ];

            const table = shadowRoot.querySelector('table');
            if (table) {
                const script = document.createElement('script');
                script.src = '/datatables/datatables.min.js';
                script.onload = () => {
                    const dataTable = new DataTable(table, {
                        ordering: false,
                        destroy: true,
                        pageLength: 50,
                        select: false,
                        scrollX: false,
                        info: false,
                        scrollCollapse: false,
                        data: this.list,
                        columns: columns,
                        language: {
                            emptyTable: `<#No_Data_In_Table#>`,
                        },
                        layout: {
                            topStart: null,
                            topEnd: null,
                            bottomStart: null,
                            bottomEnd: null
                        },
                        initComplete: function (settings, json) {
                            bindButtons();
                        },
                    });

                    this.dataTable = dataTable;
                    dataTable.on('draw', function () {
                        bindButtons();
                    });

                    function bindButtons() {
                        const ruleToggles = shadowRoot.querySelectorAll('button.rule-toggle');
                        ruleToggles.forEach(button => {
                            button.addEventListener('click', function () {
                                const rule = dataTable.row(this.closest('tr')).data();
                                rule.enable = !rule.enable;
                                if (rule.enable) {
                                    this.querySelector('i').classList.remove('ic-select');
                                    this.querySelector('i').classList.add('ic-selected');
                                } else {
                                    this.querySelector('i').classList.remove('ic-selected');
                                    this.querySelector('i').classList.add('ic-select');
                                }
                            });
                        });
                        const ruleDeletes = shadowRoot.querySelectorAll('button.rule-delete');
                        ruleDeletes.forEach(button => {
                            button.addEventListener('click', function () {
                                const row = dataTable.row(this.closest('tr'));
                                const index = row.index();
                                if (index !== -1) {
                                    row.remove();
                                    bandwidthLimiterRuleList.removeRow(index);
                                    dataTable.draw();
                                }
                            });
                        });
                    }
                };


                script.onerror = () => {
                    console.error('Failed to load DataTables script.');
                };
                shadowRoot.appendChild(script);
            } else {
                console.error('Table not found in shadowRoot.');
            }
        }

        render() {
            return this.element
        }
    }

    const bandwidthLimiterRuleList = new BandwidthLimiterRuleList();
    let bwLimiterRuleTable = null;

    async function initializeClientList() {
        let clientList = window.clientList || new ClientList();
        if (!window.clientList) {
            window.clientList = clientList;
            await clientList.init();
        }
        const deviceSelector = new ClientSelector({
            data: window.clientList.listAllClients().filter(item => !item.name.toLowerCase().includes('aiboard') && !item.amesh_isRe),
            // onSelect: (device) => {
            //     console.log('Selected device:', device);
            // }
        });
        document.querySelector('.custom-select-wrapper').appendChild(deviceSelector.render());

        const getBandwidthLimiterNvramData = async () => {
            const data = await httpApi.nvramGet(["ark_limiter_enable"], true);
            const nvramCharToAsciiData = await httpApi.nvramCharToAscii(["ark_limiter_rulelist"]);
            const ark_limiter_rulelist = decodeURIComponent(nvramCharToAsciiData.ark_limiter_rulelist);

            const support_ark_limiter_enable = ['0', '1'];
            const enableValue = data.ark_limiter_enable.toString();
            const validatedEnable = ['0', '1'].includes(enableValue) ? enableValue : support_ark_limiter_enable[0];
            const ark_limiter_rulelist_array = (ark_limiter_rulelist.length == 0) ? [] : ark_limiter_rulelist.split("<");

            const validateRule = (item) => {
                const parts = item.split(">");
                if (parts.length !== 5) return false;
                const [enable, address, download, upload, index] = parts;
                const enableValid = ['0', '1'].includes(enable);
                const macPattern = /^[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}$/;
                const ipv4Pattern = /^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
                const cidrPattern = /^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\/(3[0-2]|[1-2]?[0-9])$/;
                const addressValid = macPattern.test(address) || ipv4Pattern.test(address) || cidrPattern.test(address);
                const downloadValid = /^\d+$/.test(download);
                const uploadValid = /^\d+$/.test(upload);
                const indexValid = /^\d+$/.test(index);
                return enableValid && addressValid && downloadValid && uploadValid && indexValid;
            };

            const validatedRulelist = [];
            ark_limiter_rulelist_array.forEach(item => {
                if (validateRule(item)) {
                    validatedRulelist.push(item);
                }
            });

            return {
                ark_limiter_enable: validatedEnable,
                ark_limiter_rulelist_array: validatedRulelist
            }
        }

        getBandwidthLimiterNvramData().then(nvramData => {
            const ark_limiter_enable = nvramData.ark_limiter_enable || "0";
            const enableBandwidthBtn = document.getElementById("enable_bandwidth_btn");
            const bwSettingContainer = document.querySelector('#bandwidth-setting-container');
            if (ark_limiter_enable === "1") {
                enableBandwidthBtn.classList.add("active");
                bwSettingContainer.classList.remove("d-none");
            } else {
                enableBandwidthBtn.classList.remove("active");
                bwSettingContainer.classList.add("d-none");
            }

            const ark_qos_bw_rulelist = nvramData.ark_limiter_rulelist_array.map(item => {
                const [enable, target, download_bw, upload_bw, index] = item.split(">");
                const client = clientList.findClientByMac(target) || clientList.findClientByIp(target) || null;
                return new BandwidthLimiterRule({
                    enable: enable === "1",
                    target,
                    download_bw,
                    upload_bw,
                    client,
                    index: Number(index)
                });
            });
            ark_qos_bw_rulelist.forEach(rule => bandwidthLimiterRuleList.addRow(rule));

            // console.log("bandwidthLimiterRuleList", bandwidthLimiterRuleList.getList())

            bwLimiterRuleTable = new BandwidthLimiterRuleTable(bandwidthLimiterRuleList.getList());
            document.querySelector('#bandwidth-data-rows').appendChild(bwLimiterRuleTable.render());

            const ruleApplyBtn = document.getElementById("rule-apply-btn");
            ruleApplyBtn.addEventListener("click", () => {
                const rules = bandwidthLimiterRuleList.getList().map((rule, index) => ({
                    enable: rule.enable ? "1" : "0",
                    target: rule.target,
                    download_bw: rule.download_bw,
                    upload_bw: rule.upload_bw,
                    index: index
                }));
                const ark_limiter_rulelist = rules.map(rule => `${rule.enable}>${rule.target}>${rule.download_bw}>${rule.upload_bw}>${rule.index}`).join('<');
                // console.log(ark_limiter_rulelist)
                httpApi.nvramSet({
                    "ark_limiter_enable": enableBandwidthBtn.classList.contains("active") ? "1" : "0",
                    "ark_limiter_rulelist": ark_limiter_rulelist,
                    "action_mode": "apply",
                    "rc_service": "restart_ark",
                });
                showLoading(3);
            });

        })

        const addRowBtn = document.getElementById("add-row-btn");
        addRowBtn.addEventListener("click", () => {

            if (bandwidthLimiterRuleList.getList().length >= 32) {
                alert(`<#BwLimiter_max#>`);
                return;
            }

            function isIPv4(ip) {
                const ipv4Regex = /^(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3}$/;
                return ipv4Regex.test(ip);
            }

            function isIPv4CIDR(str) {
                const cidrRegex = /^((25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)(\.(25[0-5]|2[0-4]\d|1\d\d|[1-9]?\d)){3})\/([0-9]|[1-2][0-9]|3[0-2])$/;
                return cidrRegex.test(str);
            }

            let target = "";
            let client = null;
            const device = deviceSelector.getValue();
            if (!device) {
                if (isIPv4(deviceSelector.getInputValue().value) || isIPv4CIDR(deviceSelector.getInputValue().value)) {
                    target = deviceSelector.getInputValue().value;
                } else {
                    alert(`<#BwLimiter_select_device#>`);
                    return;
                }
            } else {
                target = device.mac;
                client = clientList.findClientByMac(target) || clientList.findClientByIp(target);
            }

            if (bandwidthLimiterRuleList.getList().find(rule => rule.target === target)) {
                alert(`<#BwLimiter_inRules#>`);
                return;
            }
            const download = document.querySelector('.setting-cell--input-group input.download-bw').value;
            const upload = document.querySelector('.setting-cell--input-group input.upload-bw').value;
            if (!download || !upload) {
                alert(`<#BwLimiter_enter_bandwidth#>`);
                return;
            }
            // create new data row (with icon button)
            const newRule = new BandwidthLimiterRule({
                enable: "1",
                target: target,
                client: client,
                download_bw: (Number(download) * 1024).toString(),
                upload_bw: (Number(upload) * 1024).toString()
            });
            bandwidthLimiterRuleList.addRow(newRule);
            bwLimiterRuleTable.dataTable.clear().rows.add(bandwidthLimiterRuleList.getList()).draw();
            deviceSelector.reset();

        });
    }

    initializeClientList();


    const enableBandwidthBtn = document.getElementById("enable_bandwidth_btn");
    enableBandwidthBtn.addEventListener("click", () => {
        enableBandwidthBtn.classList.toggle("active");
        const bwSettingContainer = document.querySelector('#bandwidth-setting-container');
        if (enableBandwidthBtn.classList.contains("active")) {
            bwSettingContainer.classList.remove("d-none");
        } else {
            httpApi.nvramSet({
                "ark_limiter_enable": enableBandwidthBtn.classList.contains("active") ? "1" : "0",
                "action_mode": "apply",
                "rc_service": "restart_ark",
            });
            bwSettingContainer.classList.add("d-none");
            showLoading(3);
        }
    });

    const bwInputs = document.querySelectorAll('.setting-cell--input-group input')
    for (let i = 0; i < bwInputs.length; i++) { const input = bwInputs[i];
        input.addEventListener('input', function () {
            let value = this.value;

            // 1. Remove illegal characters, only allow numbers and a decimal point
            value = value.replace(/[^0-9.]/g, '');

            // 2. If there are multiple decimal points, only keep the first one
            const parts = value.split('.');
            if (parts.length > 2) {
                value = parts[0] + '.' + parts.slice(1).join('');
            }

            // 3. Convert to floating point number and check the range
            const floatValue = parseFloat(value);

            // 4. Limit the maximum and minimum values
            if (!isNaN(floatValue)) {
                if (floatValue > 999999) {
                    value = '999999';
                } else if (floatValue < 0.1 && value !== '') {
                    value = '0.1';
                }
            }

            this.value = value;
        });
    }

    /* End Bandwidth Limiter */

    /* Cake UI: initialize and apply */
    (function () {
        const overheadPresets = [
            {atm: "1", overhead: "48", mpu: "0", label: "Conservative default"},
            {atm: "0", overhead: "42", mpu: "84", label: "Ethernet with VLAN"},
            {atm: "0", overhead: "18", mpu: "64", label: "Cable (DOCSIS)"},
            {atm: "0", overhead: "27", mpu: "0", label: "PPPoE VDSL"},
            {atm: "1", overhead: "32", mpu: "0", label: "RFC2684/RFC1483 Bridged LLC/Snap"},
            {atm: "1", overhead: "32", mpu: "0", label: "ADSL PPPoE VC/Mux"},
            {atm: "1", overhead: "40", mpu: "0", label: "ADSL PPPoE LLC/Snap"},
            {atm: "0", overhead: "19", mpu: "0", label: "VDSL Bridged/IPoE"},
            {atm: "2", overhead: "30", mpu: "0", label: "VDSL2 PPPoE PTM"},
            {atm: "2", overhead: "22", mpu: "0", label: "VDSL2 Bridged PTM"}
        ];

        const enableBtn = document.getElementById("enable_cake_btn");
        const uploadInput = document.getElementById("cake_upload");
        const downloadInput = document.getElementById("cake_download");
        
        const applyBtn = document.getElementById("cake_apply_btn");

        if (!enableBtn || !applyBtn) return;

        // stored values we want to preserve when applying
        let stored_mpu = "0", stored_overhead = "0", stored_atm = "0";
        const overheadInput = document.getElementById("cake_overhead");
        const mpuInput = document.getElementById("cake_mpu");
        const atmSelect = document.getElementById("cake_atm");
        const overheadPresetButton = document.getElementById("cake_overhead_pull_arrow");
        const overheadPresetList = document.getElementById("cake_overhead_presets_list");

        function setCakeOverheadPreset(index) {
            if (index < 0 || index >= overheadPresets.length) return;
            const preset = overheadPresets[index];
            if (overheadInput) overheadInput.value = preset.overhead;
            if (mpuInput) mpuInput.value = preset.mpu;
            if (atmSelect) atmSelect.value = preset.atm;
            stored_overhead = preset.overhead;
            stored_mpu = preset.mpu;
            stored_atm = preset.atm;
            if (overheadPresetList) overheadPresetList.style.display = 'none';
            if (overheadPresetButton) {
                const icon = overheadPresetButton.querySelector('#cake_overhead_pull_arrow_icon');
                if (icon) icon.textContent = '▾';
            }
        }

        function buildCakeOverheadPresetList() {
            if (!overheadPresetList) return;
            overheadPresetList.innerHTML = '';
            overheadPresets.forEach((preset, index) => {
                const entry = document.createElement('div');
                entry.className = 'dropdown-item';
                entry.textContent = preset.label;
                entry.style.padding = '5px 10px';
                entry.style.cursor = 'pointer';
                entry.addEventListener('click', () => setCakeOverheadPreset(index));
                overheadPresetList.appendChild(entry);
            });
        }

        function updateOverheadPresetVisibility() {
            if (!overheadInput || !mpuInput || !atmSelect) return;
            const currentOverhead = String(overheadInput.value || "");
            const currentMpu = String(mpuInput.value || "");
            const currentAtm = String(atmSelect.value || "");
            const matchIndex = overheadPresets.findIndex(preset =>
                preset.overhead === currentOverhead && preset.mpu === currentMpu && preset.atm === currentAtm
            );
            if (overheadPresetButton) {
                const icon = overheadPresetButton.querySelector('#cake_overhead_pull_arrow_icon');
                if (icon) icon.textContent = (matchIndex >= 0) ? '▾' : '▾';
            }
            // no real select here, just information state.
        }

        function bindCakeOverheadPresetInputListeners() {
            if (overheadPresetButton) {
                overheadPresetButton.addEventListener('click', (event) => {
                    if (!overheadPresetList) return;
                    event.stopPropagation();
                    const isOpen = overheadPresetList.style.display === 'block';
                    overheadPresetList.style.display = isOpen ? 'none' : 'block';
                    const icon = overheadPresetButton.querySelector('#cake_overhead_pull_arrow_icon');
                    if (icon) icon.textContent = isOpen ? '▾' : '▴';
                });
            }

            document.addEventListener('click', () => {
                if (overheadPresetList && overheadPresetList.style.display === 'block') {
                    overheadPresetList.style.display = 'none';
                    if (overheadPresetButton) {
                        const icon = overheadPresetButton.querySelector('#cake_overhead_pull_arrow_icon');
                        if (icon) icon.textContent = '▾';
                    }
                }
            });
            if (overheadPresetList) overheadPresetList.addEventListener('click', (e) => e.stopPropagation());

            if (overheadInput) overheadInput.addEventListener('input', () => { updateOverheadPresetVisibility(); });
            if (mpuInput) mpuInput.addEventListener('input', () => { updateOverheadPresetVisibility(); });
            if (atmSelect) atmSelect.addEventListener('change', () => { updateOverheadPresetVisibility(); });
        }

        async function loadCakeSettings() {
            try {
                const data = await httpApi.nvramGet([
                    "qos_enable",
                    "qos_type",
                    "qos_obw",
                    "qos_ibw",
                    "qos_mpu",
                    "qos_overhead",
                    "qos_atm"
                ], true);

                const isCake = (data.qos_enable == "1" && data.qos_type == "9");
                enableBtn.classList.toggle('active', isCake);

                if (uploadInput) {
                    const obw = parseInt(data.qos_obw, 10) || 0;
                    uploadInput.value = (obw / 1024).toFixed(2);
                }

                if (downloadInput) {
                    const ibw = parseInt(data.qos_ibw, 10) || 0;
                    downloadInput.value = (ibw / 1024).toFixed(2);
                }

                stored_mpu = data.qos_mpu || stored_mpu;
                stored_overhead = data.qos_overhead || stored_overhead;
                stored_atm = data.qos_atm || stored_atm;

                if (overheadInput) overheadInput.value = stored_overhead;
                if (mpuInput) mpuInput.value = stored_mpu;
                if (atmSelect) atmSelect.value = stored_atm || "0";
                updateOverheadPresetVisibility();
            } catch (e) {
                console.warn('Failed to load CAKE nvram keys', e);
            }
        }

        enableBtn.addEventListener('click', () => {
            enableBtn.classList.toggle('active');
            if (!enableBtn.classList.contains('active')) {
                httpApi.nvramSet({
                    "qos_enable": "0",
                    "action_mode": "apply",
                    "rc_service": "restart_qos;restart_ark"
                });
                showLoading(3);
            }
        });

        applyBtn.addEventListener('click', () => {
            const enabled = enableBtn.classList.contains('active');

            const ulVal = (uploadInput && uploadInput.value) ? Number(uploadInput.value) : 0;
            const dlVal = (downloadInput && downloadInput.value) ? Number(downloadInput.value) : 0;

            const payload = {
                "action_mode": "apply",
                "rc_service": "restart_qos;restart_ark",
                "qos_enable": enabled ? "1" : "0",
                "qos_type": enabled ? "9" : "0",
                "qos_obw": String(Math.round(ulVal * 1024)),
                "qos_ibw": String(Math.round(dlVal * 1024)),
                "qos_mpu": (mpuInput && mpuInput.value) ? String(mpuInput.value) : stored_mpu || "0",
                "qos_overhead": (overheadInput && overheadInput.value) ? String(overheadInput.value) : stored_overhead || "0",
                "qos_atm": (atmSelect && atmSelect.value) ? String(atmSelect.value) : stored_atm || "0"
            };

            // When enabling CAKE, also disable ARK features
            if (enabled) {
                payload["ark_qoe_enable"] = "0";
                payload["ark_limiter_enable"] = "0";
            }

            httpApi.nvramSet(payload);
            showLoading(3);
            setTimeout(() => { location.reload(); }, 3000);
        });

        buildCakeOverheadPresetList();
        bindCakeOverheadPresetInputListeners();
        // load current settings now
        loadCakeSettings();
    })();
</script>
