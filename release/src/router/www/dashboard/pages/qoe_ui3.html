<style>
    :root {
        --color-start: #005eff; /* radar-fill */
        --color-end: #08faff; /* radar-fill */
        --color-stroke-start: #4E91FB; /* radar-stroke */
        --color-stroke-end: #6DF6FA; /* radar-stroke */
        --slider-fill-start: #4E91FB; /* filled area */
        --slider-fill-end: #6DF6FA; /* filled area */
        --slider-track: #e5e7eb; /* unfilled area */
        --slider-thumb: #dc2626; /* drag handle */
        --progress: 50%;

        /* Bandwidth row specific semantic tokens */
        --bandwidth-row-bg: rgba(255, 255, 255, 0.4); /* white-alpha40 */
        --bandwidth-row-border: var(--neutral-30, #fff);
        --bandwidth-cell-divider: var(--cell-stroke);
        --bandwidth-divider-gap: 16px;
        --toggle-radius: 14px;
        --toggle-thumb-radius: 50%;
        --tab-navigation-active-text: var(--black-alpha-100);
        --tab-navigation-active-primary: var(--primary-60, #C00);
        --radius-none: 0;
        --tab-navigation-bg-color: var(--body-bg-color, #ededed);
        --tab-navigation-hover-bg: var(--black-alpha-3);
        --tab-navigation-text-color: var(--black-alpha-100);
        --setting-row-bg: var(--bandwidth-row-bg, #fff);
        --table-row-text-color: var(--body-text-color);
        --setting-row-border: var(--bandwidth-row-border);
        --cell-divider-border: var(--bandwidth-row-border);
        --divide-stroke-color-default: var(--white-alpha-60);
        --divider-strong: var(--white-alpha-100);
        --divider-weak: var(--black-alpha-3);
        --divider-default: var(--neutral-30);
    }

    [data-asuswrt-color="dark"] {
        --tab-navigation-bg-color: var(--body-bg-color, #181818);
        --tab-navigation-active-text: var(--white-alpha-100);
        --tab-navigation-active-primary: var(--primary-50, #F00);
        --tab-navigation-hover-bg: var(--white-alpha-5);
        --tab-navigation-text-color: var(--white-alpha-100);
        --setting-row-bg: rgba(24, 24, 24, 0.4);
        --bandwidth-row-bg: rgba(24, 24, 24, 0.4);
        --table-row-text-color: var(--white-alpha-100);
        --bandwidth-row-border: var(--neutral-90, #333);
        --setting-row-border: var(--bandwidth-row-border);
        --cell-divider-border: var(--bandwidth-row-border);
        --divide-stroke-color-default: var(--white-alpha-10);
        --divider-strong: var(--white-alpha-10);
        --divider-weak: var(--white-alpha-5);
        --divider-default: var(--neutral-90);
    }

    body {
        font-size: .875rem;
    }

    .qoe-container > .row {
        flex-direction: column-reverse;
    }

    .radar-info {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: row;
        position: relative;
        z-index: 1;
        margin-top: 16px;
    }

    .fn-button-container {
        display: flex;
        flex-direction: row;
        width: 100%;
        align-items: center;
        gap: 8px;
        justify-content: space-around;
        margin-top: .5rem;
        margin-bottom: 1.5rem;
    }

    .info-panel {
        height: 90%;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        z-index: 7;
    }

    .info-panel h2 {
        margin-top: 0;
    }

    /* pentagon area animation */

    .svg-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .svg-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    .svg-container svg {
        width: 100%;
        height: 100%;
    }

    .svg-layer svg {
        animation: none;
        transform-origin: center center;
    }

    .svg-layer svg.animate {
        animation: fadeIn 1s ease-out forwards;
    }

    @keyframes fadeIn {
        0% {
            opacity: 0;
            transform: scale(0.95);
        }
        100% {
            opacity: 1;
            transform: scale(1);
        }
    }

    /* end-pentagon area animation */

    /* button animation effects */
    .mode-button {
        max-width: 20%;
        width: 20%;
        position: relative;
        padding: 8px 12px;
        font-size: 14px;
        background-color: var(--qoe-button-bg-color, #0090d8);
        border: none;
        border-radius: var(--global-radius);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .mode-button div {
        display: flex;
        flex-shrink: 0;
        gap: 8px;
        align-items: center;
        flex-direction: column;
        z-index: 6;
    }

    .mode-button.active {
        background-color: var(--qoe-button-active-bg-color, #005bb5);
    }

    .mode-button:hover {
        transform: scale(1.05);
    }

    .mode-button i {
        z-index: 6;
        background-color: var(--body-text-color);
    }

    .mode-button-text {
        max-width: 68px;
    }

    #chartContainer {
        position: relative;
        width: 280px;
        height: 280px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #glowCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
    }

    #radarChart {
        z-index: 5;
        width: 255px;
        height: 255px;
    }

    canvas {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%); /* center canvas completely */
        background-color: transparent;
        width: 100%;
        height: 100%;
    }

    .circle-animation {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 400px;
        height: 400px;
        border: 5px solid rgba(0, 255, 255, 0.3);
        border-top: 5px solid cyan;
        border-radius: 50%;
        animation: spin 3s linear infinite;
        transform-origin: center center; /* set rotation center */
        transform: translate(-50%, -50%); /* ensure position */
    }

    .slider-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    .slider-and-btn {
        display: flex;
        align-items: center;
        flex-direction: column;
        gap: 24px;
    }

    .tuning-controller {
        width: 100%;
    }

    #applyBtn {
        width: 100%;
        background: var(--qoe-apply-button-bg-color);
        border: none;
    }

    #applyBtn:hover {
        background: var(--qoe-apply-button-hover-bg-color);
    }

    label {
        font-weight: bold;
    }

    .manual-chart-container canvas {
        cursor: grab;
    }

    .pentagon-container {
        position: absolute;
        width: 280px;
        height: 280px;
        z-index: 7;
        font-size: 0.75rem;
    }

        align-items: center;
        justify-content: center;

    }

    /* slider styles */
    input[type="range"] {
        z-index: 10;
        cursor: pointer;
        -webkit-appearance: none;
        width: 100%;
        height: 8px;
        border-radius: 4px;
        background: linear-gradient(
                to right,
                var(--slider-fill-start),
                var(--slider-fill-end) 50%,
                var(--slider-track) 50%
        );
        outline: none;
        transition: background 0.3s ease;
    }

    .slider-container input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--slider-thumb);
        box-shadow: 0 0 4px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        position: relative;
        z-index: 1;
    }

    /* drag handle styles */
    input[type="range"]::-webkit-slider-thumb {

<script type="module">
    import {AsuswrtWidgetLoading, ClientSelector} from "/js/component.module.js";
    import {ClientList} from '/js/clientlist.module.js';

    function onTabShown(tab) {
        // Logic to execute when switching tabs, e.g., DataTables adjustments
        if (tab === 'bandwidth') {
            if (bwLimiterRuleTable && bwLimiterRuleTable.dataTable) {
                setTimeout(() => {
                    bwLimiterRuleTable.dataTable.columns.adjust();
                }, 50);
            }
        }
    }

    document.querySelectorAll("button.tab-navigation__item").forEach(button => {
        button.addEventListener("click", () => {
            document.querySelectorAll("button.tab-navigation__item").forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");
            const tab = button.getAttribute("data-tab");
            document.querySelectorAll(".tab-content").forEach(container => container.style.display = "none");
            const tabSection = document.getElementById(`tab-section-${tab}`);
            tabSection.style.display = "block";

            onTabShown(tab);
        });
    });

    const widgetloader = new AsuswrtWidgetLoading();
    document.querySelector('#workarea').appendChild(widgetloader.render());

    const getNvramData = async () => {
        const data = await httpApi.nvramGet(["ark_qoe_enable", "ark_qoe_profile"], true);
        const nvramCharToAsciiData = await httpApi.nvramCharToAscii(["ark_qoe_psettings"]);
        const orig_ark_qoe_psettings = decodeURIComponent(nvramCharToAsciiData.ark_qoe_psettings);
        const support_ark_qoe_enable = ['0', '1'];
        const support_ark_qoe_profile = ["ai", "gaming", "streaming", "wfh", "office"];
        const enableValue = data.ark_qoe_enable.toString();
        const validatedEnable = support_ark_qoe_enable.includes(enableValue) ? enableValue : support_ark_qoe_enable[0];
        const validatedProfile = support_ark_qoe_profile.includes(data.ark_qoe_profile) ? data.ark_qoe_profile : support_ark_qoe_profile[0];
        const validatePsettingsRange = (psettings) => {
            const parts = psettings.split("<");
            if (parts.length !== 5) return false;
            return parts.every(part => {
                const num = parseInt(part);
                return num >= -10 && num <= 10 && !isNaN(num);
            });
        };

        const validatedPsettings = validatePsettingsRange(orig_ark_qoe_psettings)
            ? orig_ark_qoe_psettings
            : "0<0<0<0<0";
        return {
            orig_ark_qoe_enable: validatedEnable,
            orig_ark_qoe_profile: validatedProfile,
            orig_ark_qoe_psettings_array: validatedPsettings.split("<"),
        }
    }

    class qoeModeButton {
        constructor(props) {
            const {
                text = '',
                active = false,
            } = props;
            this.element = document.createElement('div');
            const template = document.createElement('template');
            this.element.className = 'mode-button';
            if (active) {
                this.element.classList.add('active');
            }
            template.innerHTML = text;
            this.element.appendChild(template.content.cloneNode(true));
            return this.element;
        }
    }

    getNvramData().then(nvramData => {
        const orig_ark_qoe_enable = nvramData.orig_ark_qoe_enable || "0";
        const orig_ark_qoe_profile = nvramData.orig_ark_qoe_profile || "ai";
        const orig_ark_qoe_psettings_array = nvramData.orig_ark_qoe_psettings_array || ["0", "0", "0", "0", "0"];

        const modes = [
            {
                title: "<#AiQoE_mode_balance#>",
                text: `<i class="ic-qoe-aibalance"></i><div class="mode-button-text"><#AiQoE_mode_balance#></div>`,
                mode: "ai",
                value: orig_ark_qoe_psettings_array[0],
                desc: `<#AiQoE_mode_balance_desc#>`,
                radarSet: [70, 80, 50, 60, 50],
                splitLine: true,
                nodeFormula: x => [Math.max(0, 4 - (x / 10)), Math.max(0, 4 + (x / 10)), Math.max(1, 2 - (x / 10)), 3, Math.max(0, 3 + (x / 10))],
            },
            {
                title: "<#AiQoE_mode_gaming#>",
                text: `<i class="ic-qoe-gaming"></i><div class="mode-button-text"><#AiQoE_mode_gaming#></div>`,
                mode: "gaming",
                value: orig_ark_qoe_psettings_array[1],
                desc: `<#AiQoE_mode_gaming_desc#>`,
                radarSet: [50, 95, 30, 40, 85],
                splitLine: true,
                nodeFormula: x => [Math.max(0, 2 - (x / 10)), Math.max(0, 5 + (x / 10)), Math.max(1, 1 - (x / 10)), 2, Math.max(0, 3 + (x / 10))],
            },
            {
                title: "<#AiQoE_mode_streaming#>",
                text: `<i class="ic-qoe-streaming"></i><div class="mode-button-text"><#AiQoE_mode_streaming#></div>`,
                mode: "streaming",
                value: orig_ark_qoe_psettings_array[2],
                desc: `<#AiQoE_mode_streaming_desc#>`,
                radarSet: [90, 50, 40, 80, 60],
                splitLine: true,
                nodeFormula: x => [Math.max(0, 3 - (x / 10)), 3, 1, Math.max(0, 5 + (x / 10)), 2],
            },
            {
                title: "<#AiQoE_mode_wfh#>",
                text: `<i class="ic-qoe-wfh"></i><div class="mode-button-text"><#AiQoE_mode_wfh#></div>`,
                mode: "wfh",
                value: orig_ark_qoe_psettings_array[3],
                desc: `<#AiQoE_mode_wfh_desc#>`,
                radarSet: [60, 40, 80, 50, 70],
                splitLine: true,
                nodeFormula: x => [Math.max(0, 3 - (x / 10)), Math.max(0, 3 + (x / 10)), Math.max(1, 3 - (x / 10)), 3, Math.max(0, 4 + (x / 10))],
            },
            {
                title: "<#AiQoE_mode_office#>",
                text: `<i class="ic-qoe-office"></i><div class="mode-button-text"><#AiQoE_mode_office#></div>`,
                mode: "office",
                value: orig_ark_qoe_psettings_array[4],
                desc: `<#AiQoE_mode_office_desc#>`,
                radarSet: [50, 30, 90, 45, 60],
                splitLine: false,
                nodeFormula: x => [Math.max(0, 3 - (x / 10)), 1, Math.max(0, 4 - (x / 10)), 3, Math.max(0, 5 + (x / 10))],
            },
        ]
        const thisMode = modes.find(m => m.mode === orig_ark_qoe_profile);
        thisMode.active = true;

        const title = document.getElementById("modeTitle");
        const description = document.getElementById("modeDescription");
        const slider = document.getElementById("tuningSlider");
        const sliderValue = document.getElementById("tuningValue");
        title.textContent = thisMode.title;
        description.textContent = thisMode.desc;
        slider.value = thisMode.value;
        sliderValue.innerText = thisMode.value;
        updateSliderBackground(slider);

        modes.forEach(m => {
            const btn = new qoeModeButton({
                text: m.text,
                active: m.active,
            });
            btn.setAttribute("data-mode", m.mode);
            btn.addEventListener("click", () => {
                const buttons = document.querySelectorAll(".mode-button");
                buttons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                modes.forEach(m => m.active = false);
                m.active = true;

                const title = document.getElementById("modeTitle");
                const description = document.getElementById("modeDescription");
                const slider = document.getElementById("tuningSlider");
                const sliderValue = document.getElementById("tuningValue");
                title.textContent = m.title;
                description.textContent = m.desc;

                radarChart.data.datasets[0].data = m.nodeFormula(0).map(dara => {
                    return dara * 0.6; // adjust point size
                });
                radarChart.data.datasets[1].data = m.nodeFormula(0).map(dara => {
                    return dara * 0.8; // adjust point size
                });
                radarChart.data.datasets[2].data = m.nodeFormula(0);
                radarChart.update();

                slider.value = m.value;
                slider.dispatchEvent(new Event('input'));
                sliderValue.innerText = m.value;

                replayAnimation(svgLayer1Id);
            });
            m.btn = btn;
            document.querySelector('.fn-button-container').append(btn);
            // if (m.splitLine) {
            //     const splitLine = document.createElement('div');
            //     splitLine.className = 'split-line';
            //     document.querySelector('.button-container').append(splitLine);
            // }
        })

        const svgLayer1Id = 'radarAnimate';

        function replayAnimation(svgId) {
            const svg = document.getElementById(svgId);
            if (!svg) return;

            const parent = svg.parentNode;
            const clone = svg.cloneNode(true);

            // remove original SVG and reinsert to force trigger CSS animation
            parent.removeChild(svg);
            parent.appendChild(clone);
        }

        window.addEventListener('DOMContentLoaded', () => {
            replayAnimation(svgLayer1Id);
        });

        const labels = ['Bandwidth Utilization', 'Game', 'File Transfer', 'Multimedia', 'Real-Time'];

        Chart.register({
            id: 'centerLinesPlugin',
            afterDatasetsDraw(chart) {
                const {ctx, chartArea, scales} = chart;
                const r = scales.r;
                const numberOfPoints = 5;

                ctx.save();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; // dashed line color
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]); // dashed line style [line length, gap length]

                for (let i = 0; i < numberOfPoints; i++) {
                    // calculate angle: first point at top (-90 degrees), then clockwise distribution
                    const angle = (Math.PI * 2 / numberOfPoints) * i - Math.PI / 2;
                    const x = r.xCenter + Math.cos(angle) * r.drawingArea;
                    const y = r.yCenter + Math.sin(angle) * r.drawingArea;

                    ctx.beginPath();
                    ctx.moveTo(r.xCenter, r.yCenter);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                }

                ctx.restore();
            }
        });

        const ctx = document.getElementById('radarChart').getContext('2d');

        // get CSS variable values
        const style = getComputedStyle(document.documentElement);
        const colorStart = style.getPropertyValue('--color-start').trim();
        const colorEnd = style.getPropertyValue('--color-end').trim();

        // create center radial gradient
        const gradient = ctx.createLinearGradient(
            120, 120,
            240, 240
        );
        gradient.addColorStop(0, colorStart); // center color
        gradient.addColorStop(0.5, '#c3fff5'); // center color
        gradient.addColorStop(1, colorEnd);   // outer color

        let radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '',
                        data: thisMode.nodeFormula(thisMode.value).map(data => {
                            return data * 0.6;
                        }),
                        borderColor: '#ffffff',
                        backgroundColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 0,
                        pointRadius: 0,
                        pointHoverRadius: 0,
                        hoverBackgroundColor: 'transparent',
                        hoverBorderColor: 'transparent'
                    },
                    {
                        label: '',
                        data: thisMode.nodeFormula(thisMode.value).map(data => {
                            return data * 0.8;
                        }),
                        borderColor: '#ffffff',
                        backgroundColor: 'rgba(255, 255, 255, 0.15)',
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 0,
                        pointRadius: 0,
                        pointHoverRadius: 0,
                        hoverBackgroundColor: 'transparent',
                        hoverBorderColor: 'transparent'
                    },
                    {
                        label: '',
                        data: thisMode.nodeFormula(thisMode.value),
                        borderColor: '#ffffff',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#f5f5f5',
                        pointBorderWidth: 1,
                        pointRadius: 3,
                        pointHoverRadius: 5
                    },]
            },
            options: {
                responsive: false,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        min: 0,
                        max: 7,
                        ticks: {
                            stepSize: 1,
                            display: false,
                            backdropColor: 'transparent'
                        },
                        grid: {
                            display: false,
                            color: 'transparent'
                        },
                        angleLines: {
                            display: false,
                            color: 'transparent'
                        },
                        pointLabels: {
                            display: false
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        filter: function (tooltipItem) {
                            // only show tooltip for third dataset (index === 2)
                            return tooltipItem.datasetIndex === 2;
                        },
                        backgroundColor: 'rgba(0, 0, 0, 0.8)',
                        titleColor: '#fff',
                        bodyColor: '#fff',
                        borderColor: '#ddd',
                        borderWidth: 1,
                        cornerRadius: 8,
                        padding: 10,
                        displayColors: false,
                        callbacks: {
                            label: function (context) {
                                return 'Value: ' + context.parsed.r;
                            }
                        }
                    }
                }
            }
        });

        window.modes = modes;

        function updateSliderValue(event) {
            const target = event?.target || document.getElementById("tuningSlider");
            const value = target.value;
            let x = parseInt(value);
            document.getElementById("tuningValue").innerText = x;
            applySliderValue(x);
            updateSliderBackground(target);
        }

        function applySliderValue(x) {
            const mode = modes.filter(m => m.active)[0];
            if (mode) {
                radarChart.data.datasets[0].data = mode.nodeFormula(x).map(data => {
                    return data * 0.6;
                });
                radarChart.data.datasets[1].data = mode.nodeFormula(x).map(data => {
                    return data * 0.8;
                });
                radarChart.data.datasets[2].data = mode.nodeFormula(x);
                radarChart.update();
            }
        }

        document.getElementById('tuningSlider').addEventListener('input', updateSliderValue);

        function updateSliderBackground(sliderEl) {
            const min = Number(sliderEl.min);
            const max = Number(sliderEl.max);
            const val = Number(sliderEl.value);
            const percent = ((val - min) / (max - min)) * 100;

            sliderEl.style.background = `linear-gradient(to right,
                var(--slider-fill-start) 0%,
                var(--slider-fill-end) ${percent}%,
                var(--slider-track) ${percent}%,
                var(--slider-track) 100%)`;
        }

        // apply_btn click event
        const applyBtn = document.getElementById("applyBtn");
        applyBtn.addEventListener("click", function () {
            applyQoE()
        });

        var apply_obj = {
            "action_mode": "apply",
            "rc_service": "restart_ark",
        }

        function applyQoE() {
            let hasActive = true;
            const set_qoe_profile = find_profile();
            if (set_qoe_profile) {

                const sliderValue = parseInt(document.getElementById("tuningSlider").value);
                const modeaArray = modes.map((m, i) => m.active ? sliderValue : orig_ark_qoe_psettings_array[i]);

                const set_qoe_psettings = modeaArray.join("<");
                apply_obj["qos_enable"] = "0";
                apply_obj["qos_type"] = "4";
                apply_obj["ark_qoe_enable"] = (hasActive == true) ? "1" : "0";
                apply_obj["ark_qoe_profile"] = set_qoe_profile;
                apply_obj["ark_qoe_psettings"] = set_qoe_psettings;
                httpApi.nvramSet(apply_obj);
                top.showLoading(3);
                setTimeout(() => {
                    location.reload();
                }, 3000);
            }
        }

        function find_profile() {
            const mode = modes.filter(m => m.active)[0];
            if (mode) {
                return mode.mode;
            } else {
                alert(`Please select a mode.`);  //Untranslated
                return false;
            }
        }
    }).then(() => {
        widgetloader.hide();
    })

</script>
</body>
</html>
